<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🚑 Emergency Details</h2>

<div id="data">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7E7Rn46k1nC6MFcMJZ6aLWxZMQXZD-bc",
  authDomain: "emergency-qr-950e5.firebaseapp.com",
  projectId: "emergency-qr-950e5",
  storageBucket: "emergency-qr-950e5.firebasestorage.app",
  messagingSenderId: "670165302728",
  appId: "1:670165302728:web:b5ceb69c82ea8c0f9d94fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

window.sendLocation = function(phone) {

  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "Geolocation not supported";
    return;
  }

  status.innerText = "Getting location...";

  navigator.geolocation.getCurrentPosition(

    position => {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      const locationLink =
      `https://www.google.com/maps?q=${lat},${lon}`;

      const message =
      `🚨 Emergency Alert!

My Current Location:
${locationLink}`;

      const whatsappURL =
      `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

      window.open(whatsappURL, "_blank");

      status.innerText = "Location Shared Successfully ✅";
    },

    error => {
      status.innerText = "Location Permission Denied ❌";
    }

  );
};

async function loadProfile() {

  if (!id) {
    document.getElementById("data").innerHTML =
    "❌ No ID found in URL";
    return;
  }

  try {

    const docRef = doc(db, "users", id);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {

      const user = docSnap.data();

      document.getElementById("data").innerHTML = `
        <h3>🚨 Emergency Information</h3>

        <p><b>👤 Name:</b> ${user.name || "-"}</p>

        <p><b>📞 Emergency Contact 1:</b> ${user.contact1 || "-"}</p>

        <p><b>📞 Emergency Contact 2:</b> ${user.contact2 || "-"}</p>

        <br>

        <a class="call-btn" href="tel:${user.contact1 || ''}">
          📞 Call Contact 1
        </a>

        <br><br>

        <button class="call-btn"
        onclick="sendLocation('${user.contact1 || ''}')">
          📍 Share Location To Contact 1
        </button>

        <br><br>

        <a class="call-btn" href="tel:${user.contact2 || ''}">
          📞 Call Contact 2
        </a>

        <br><br>

        <button class="call-btn"
        onclick="sendLocation('${user.contact2 || ''}')">
          📍 Share Location To Contact 2
        </button>

        <br><br>

        <p id="status"></p>
      `;

    } else {

      document.getElementById("data").innerHTML =
      "❌ No Data Found";

    }

  } catch (error) {

    console.log(error);

    document.getElementById("data").innerHTML =
    "❌ Error loading data";

  }

}

loadProfile();

</script>

</body>
</html>
