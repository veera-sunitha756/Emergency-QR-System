<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<div class="container">

  <h2>🚑 Emergency QR Registration</h2>

  <input id="name" placeholder="Enter Your Name"><br><br>

  <input id="blood" placeholder="Blood Group"><br><br>

  <input id="contact1" placeholder="Emergency Contact 1"><br><br>

  <input id="contact2" placeholder="Emergency Contact 2"><br><br>

  <input id="address" placeholder="Address"><br><br>

  <button type="button" onclick="saveData()">
    Generate QR
  </button>

  <br><br>

  <canvas id="qr"></canvas>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
